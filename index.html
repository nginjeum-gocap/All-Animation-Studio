<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Animation Studio</title>
  <style>
    /* --- CSS UNTUK TAMPILAN --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0b0c10;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* NAVBAR UTAMA STYLE GAMING */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #1f2833;
      padding: 12px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(0, 243, 255, 0.1); /* Shadow neon tipis di bawah navbar */
      border-bottom: 1px solid rgba(102, 252, 241, 0.2);
      height: 70px;
    }

    .logo-area {
      position: relative;
      flex-grow: 1;
      height: 100%;
      display: flex;
      align-items: center;
    }

    /* ANIMASI LOGO PEMBUKA */
    .logo-singkat {
      position: absolute;
      left: 0;
      font-size: 1.1rem;
      font-weight: bold;
      color: #66fcf1;
      line-height: 1.2;
      text-shadow: 0 0 8px rgba(102, 252, 241, 0.5);
      animation: munculLaluHilang 2.5s ease-in-out forwards;
    }

    .logo-lengkap {
      position: absolute;
      width: 100%;
      font-size: 1.05rem;
      font-weight: bold;
      color: #66fcf1;
      line-height: 1.2;
      text-align: center;
      text-shadow: 0 0 10px rgba(102, 252, 241, 0.6);
      opacity: 0;
      animation: geserKeTengah 2s ease-out 2.3s forwards;
    }

    /* TOMBOL MENU EFEK GLOW GAMING */
    .menu-toggle {
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      padding: 10px;
      background-color: rgba(102, 252, 241, 0.05);
      border-radius: 8px;
      border: 1px solid rgba(102, 252, 241, 0.3);
      flex-shrink: 0;
      z-index: 10;
      transition: all 0.3s ease; /* Transisi halus pas disentuh */
    }

    /* Efek hover/sentuh menyala khas game */
    .menu-toggle:hover, .menu-toggle.active-btn {
      background-color: rgba(102, 252, 241, 0.2);
      border-color: #66fcf1;
      box-shadow: 0 0 12px rgba(102, 252, 241, 0.5);
      transform: scale(1.05);
    }

    .menu-toggle span {
      width: 18px;
      height: 2px;
      background-color: #66fcf1;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    /* --- LOGIK ANIMASI KEYFRAMES --- */
    @keyframes munculLaluHilang {
      0% { opacity: 0; transform: translateX(-20px); }
      30% { opacity: 1; transform: translateX(0); }
      80% { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(0); visibility: hidden; }
    }

    @keyframes geserKeTengah {
      0% { opacity: 0; transform: translateX(-40px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    /* DROPDOWN MENU ANIMASI MELUNCUR (SLIDE DOWN) */
    .dropdown-menu {
      position: absolute;
      top: 75px; 
      right: 20px;
      background-color: #1f2833;
      border: 1px solid #66fcf1;
      border-radius: 10px;
      width: 190px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.7), 0 0 10px rgba(102, 252, 241, 0.2);
      overflow: hidden;
      z-index: 1000;
      
      /* Menyembunyikan menu dengan set animasi awal scale & opacity */
      opacity: 0;
      transform: translateY(-15px) scale(0.95);
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* Efek pantulan elastis halus */
    }

    /* Ketika aktif, menu meluncur ke bawah dan membesar pas */
    .dropdown-menu.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .dropdown-menu a {
      display: block;
      color: white;
      padding: 14px 18px;
      text-decoration: none;
      font-size: 0.95rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s ease;
    }

    .dropdown-menu a:hover {
      background-color: #66fcf1;
      color: #0b0c10;
      padding-left: 22px; /* Efek teks bergeser sedikit ke kanan saat ditunjuk */
      font-weight: bold;
    }

    /* HERO SECTION */
    .hero {
      height: calc(100vh - 70px);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      background: radial-gradient(circle, #1f2833 0%, #0b0c10 100%);
    }

    .hero-content {
      max-width: 600px;
    }

    .hero-content h1 {
      font-size: 2.3rem;
      margin-bottom: 15px;
      line-height: 1.2;
    }

    .highlight {
      color: #66fcf1;
      text-shadow: 0 0 15px rgba(102, 252, 241, 0.6);
    }

    .hero-content p {
      font-size: 1rem;
      color: #c5c6c7;
      margin-bottom: 35px;
    }

    .hero-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .btn-primary {
      background-color: #66fcf1;
      color: #0b0c10;
      padding: 12px 24px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(102, 252, 241, 0.3);
      transition: 0.3s;
    }

    .btn-primary:hover {
      background-color: #45b6fe;
      transform: translateY(-2px);
    }

    .btn-secondary {
      border: 2px solid #66fcf1;
      color: #66fcf1;
      padding: 12px 24px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-secondary:hover {
      background-color: rgba(102, 252, 241, 0.1);
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .hero-content h1 {
        font-size: 1.8rem;
      }
      .hero-buttons {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <header class="navbar">
    
    <div class="logo-area">
      <div class="logo-singkat">AA<br>STUDIO</div>
      <div class="logo-lengkap">ALL ANIMATION<br>STUDIO</div>
    </div>

    <div class="menu-toggle" id="menuBtn">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="dropdown-menu" id="dropdownMenu">
      <a href="#beranda">🏠 Beranda</a>
      <a href="#animasi">🎬 Animasi Studio</a>
      <a href="#masuk">👤 Masuk Akun</a> 
    </div>
  </header>

  <main class="hero">
    <div class="hero-content">
      <h1>Hi, Selamat Datang di <span class="highlight">Vano Studio</span></h1>
      <p>Temukan animasi keren, artikel menarik, dan project seru di sini.</p>
      <div class="hero-buttons">
        <a href="#animasi" class="btn-primary">Mulai Jelajah</a>
        <a href="#blog" class="btn-secondary">Baca Artikel</a>
      </div>
    </div>
  </main>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle('active');
      menuBtn.classList.toggle('active-btn');
    });

    document.addEventListener('click', () => {
      dropdownMenu.classList.remove('active');
      menuBtn.classList.remove('active-btn');
    });
  </script>

</body>
</html>
