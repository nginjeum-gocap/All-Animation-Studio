<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live System Update Log - All Animation Studio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css style/nevbar.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #050608;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* NAVBAR NAVBAR UTUH (SINKRON BERANDA & ARTIKEL) */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(13, 15, 19, 0.75);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 243, 255, 0.15);
      border-bottom: 1px solid rgba(102, 252, 241, 0.25);
      height: 70px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      flex-grow: 1;
      height: 100%;
    }

    /* TOMBOL DROPDOWN MENU */
    .menu-toggle {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      background-color: rgba(102, 252, 241, 0.03);
      border-radius: 50%;
      border: 1px solid rgba(102, 252, 241, 0.25);
      flex-shrink: 0;
      z-index: 1010;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .menu-toggle:hover { background-color: rgba(102, 252, 241, 0.12); box-shadow: 0 0 15px rgba(102, 252, 241, 0.35); }
    .menu-toggle span { width: 18px; height: 2px; background-color: #66fcf1; border-radius: 2px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .menu-toggle.active-btn span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .menu-toggle.active-btn span:nth-child(2) { opacity: 0; transform: scale(0); }
    .menu-toggle.active-btn span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    .dropdown-menu {
      position: absolute;
      top: 75px; right: 20px;
      background-color: #12141c;
      border: 1px solid #66fcf1;
      border-radius: 12px;
      width: 200px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.65), 0 0 15px rgba(102, 252, 241, 0.15);
      overflow: hidden;
      z-index: 1000;
      opacity: 0;
      transform: translateY(-25px) scale(0.93);
      pointer-events: none;
      transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .dropdown-menu.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .dropdown-menu a { display: block; color: white; padding: 14px 20px; text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s; }
    .dropdown-menu a:hover { background-color: rgba(102, 252, 241, 0.08); color: #66fcf1; padding-left: 26px; }

    /* LAYOUT UTAMA LOG CONTAINER */
    .log-page {
      max-width: 750px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .btn-back-container {
      margin-bottom: 35px;
      display: inline-block;
      position: relative;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 22px;
      font-size: 0.9rem;
      font-weight: bold;
      color: #ffffff;
      text-decoration: none;
      background: #0d1117;
      border-radius: 30px;
      position: relative;
      z-index: 1;
      overflow: hidden;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn-back-container::before, .btn-back-container::after {
      content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(45deg, #00ffff, #00ff7f, #ffff00, #ff0055, #7f00ff, #00ffff);
      background-size: 400%; border-radius: 32px; z-index: 0; animation: gerakLED 6s linear infinite;
    }
    .btn-back-container::before { filter: blur(2px); }
    .btn-back-container::after { filter: blur(12px); opacity: 0.7; transition: opacity 0.3s; }
    .btn-back::before {
      content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg);
    }
    .btn-back-container:hover::after { opacity: 1; }
    .btn-back-container:hover .btn-back { background: #121721; color: #00ffff; text-shadow: 0 0 5px #00ffff; }
    .btn-back-container:hover .btn-back::before { left: 150%; transition: all 0.6s ease; }

    @keyframes gerakLED {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .status-panel {
      background: rgba(18, 20, 28, 0.6);
      border: 1px solid rgba(102, 252, 241, 0.2);
      border-radius: 12px;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 40px;
    }

    .pulse-dot {
      width: 12px;
      height: 12px;
      background-color: #00ff7f;
      border-radius: 50%;
      box-shadow: 0 0 10px #00ff7f;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 255, 127, 0.7); }
      70% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 0 8px rgba(0, 255, 127, 0); }
      100% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 255, 127, 0); }
    }

    .status-text {
      font-size: 0.9rem;
      color: #66fcf1;
      font-weight: 500;
    }

    .timeline {
      position: relative;
      border-left: 2px solid rgba(102, 252, 241, 0.2);
      padding-left: 20px;
    }

    .log-item {
      position: relative;
      margin-bottom: 35px;
    }

    .log-node {
      position: absolute;
      left: -27px;
      top: 5px;
      width: 12px;
      height: 12px;
      background: #050608;
      border: 2px solid #00ffff;
      border-radius: 50%;
      box-shadow: 0 0 8px #00ffff;
    }

    .log-item.baru .log-node {
      border-color: #00ff7f;
      box-shadow: 0 0 8px #00ff7f;
    }

    .log-date {
      font-size: 0.8rem;
      color: #797a86;
      margin-bottom: 5px;
    }

    .log-card {
      background-color: #12141c;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s;
    }

    .log-item.baru .log-card {
      border: 1px solid rgba(0, 255, 127, 0.25);
      box-shadow: 0 4px 15px rgba(0, 255, 127, 0.05);
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .log-title {
      font-size: 1.1rem;
      color: #ffffff;
      font-weight: 600;
    }

    .badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: bold;
    }

    .badge-fitur { background: rgba(0, 255, 127, 0.1); color: #00ff7f; border: 1px solid rgba(0, 255, 127, 0.3); }
    .badge-bug { background: rgba(255, 0, 85, 0.1); color: #ff0055; border: 1px solid rgba(255, 0, 85, 0.3); }

    .log-body {
      font-size: 0.92rem;
      color: #c5c6c7;
      line-height: 1.5;
    }

    .system-msg {
      margin-top: 12px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #00ffff;
      background: rgba(0, 243, 255, 0.05);
      padding: 6px 10px;
      border-radius: 6px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo-area">
      <div class="logo-vv-container">
        <span class="char-v v-flipped">V</span>
        <span class="char-v v-normal">V</span>
      </div>
      
      <div class="text-wrapper">
        <span class="logo-text-top">
          <span class="gold-a">A</span>LL <span class="gold-a">A</span>NIMATION
        </span>
        <span class="logo-text-bottom">STUDIO</span>
      </div>
    </div>

    <div class="menu-toggle" id="menuBtn"><span></span><span></span><span></span></div>
    <div class="dropdown-menu" id="dropdownMenu">
      <a href="../index.html">🏠 Beranda</a>
      <a href="../Animasi Studio/studio.html">🎬 Animasi Studio</a>
      <a href="#masuk">👤 Masuk Akun</a> 
    </div>
  </header>

  <main class="log-page">
    
    <div class="btn-back-container">
      <a href="../index.html" class="btn-back">← Kembali ke Beranda</a>
    </div>

    <div class="status-panel">
      <div class="pulse-dot"></div>
      <div class="status-text" id="statusServer">Sistem Aktif: Menghubungkan ke Repositori GitHub All Animation Studio...</div>
    </div>

    <div class="timeline" id="logTimeline"></div>

  </main>

  <script>
    // Logika kontrol drop-down navbar
    const menuBtn = document.getElementById('menuBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle('active');
      menuBtn.classList.toggle('active-btn');
    });

    document.addEventListener('click', () => {
      dropdownMenu.classList.remove('active');
      menuBtn.classList.remove('active-btn');
    });

    // ===================================================
    // KONEKSI UTAMA KE REPO GITHUB API (DEEP FOLDER TRACKER)
    // ===================================================
    const timelineContainer = document.getElementById('logTimeline');
    const statusServer = document.getElementById('statusServer');
    
    let hashCommitTerakhir = ""; 

    function hitungWaktuLalu(waktuISO) {
      const target = new Date(waktuISO);
      const sekarang = new Date();
      const selisihDetik = Math.floor((sekarang - target) / 1000);

      if (selisihDetik < 60) return 'Baru saja';
      const selisihMenit = Math.floor(selisihDetik / 60);
      if (selisihMenit < 60) return `${selisihMenit} menit yang lalu`;
      const selisihJam = Math.floor(selisihMenit / 60);
      if (selisihJam < 24) return `${selisihJam} jam yang lalu`;
      
      return target.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function ambilDataGitHubCommits() {
      fetch('https://api.github.com/repos/nginjeum-gocap/All-Animation-Studio/commits')
        .then(response => {
          if (response.status === 403) {
            throw new Error("Batas kuota akses GitHub API habis. Sistem akan mencoba memulihkan otomatis.");
          }
          if (!response.ok) throw new Error("Gagal memuat repositori GitHub.");
          return response.json();
        })
        .then(async (commits) => {
          if (!commits || commits.length === 0) return;

          if (commits[0].sha === hashCommitTerakhir) {
            console.log("Sistem Log: Tidak ada perubahan kode baru di GitHub cloud. Mode hemat kuota aktif.");
            return; 
          }
          hashCommitTerakhir = commits[0].sha;

          timelineContainer.innerHTML = ''; 
          statusServer.innerText = "Sistem Aktif: Memantau pergerakan file hingga ke dalam folder tersembunyi.";

          const batasCommit = commits.slice(0, 5);

          for (let indeks = 0; indeks < batasCommit.length; indeks++) {
            const item = batasCommit[indeks];
            const infoCommit = item.commit;
            const pesanCommit = infoCommit.message;
            const tanggalISO = infoCommit.committer.date;
            
            const tanggalObjek = new Date(tanggalISO);
            const opsiWaktu = { hour: '2-digit', minute: '2-digit' };
            const jamMenit = tanggalObjek.toLocaleTimeString('id-ID', opsiWaktu);
            const stringWaktuRelatif = hitungWaktuLalu(tanggalISO);

            let teksDaftarFile = "Buka riwayat arsip untuk melihat detail modifikasi.";
            
            if (indeks === 0) {
              teksDaftarFile = "Mendeteksi perubahan konfigurasi global.";
              try {
                const responDetail = await fetch(`https://api.github.com/repos/nginjeum-gocap/All-Animation-Studio/commits/${item.sha}`);
                if (responDetail.ok) {
                  const dataDetail = await responDetail.json();
                  if (dataDetail.files && dataDetail.files.length > 0) {
                    teksDaftarFile = dataDetail.files.map(f => `📁 ${f.filename}`).join(', ');
                  }
                }
              } catch (e) {
                console.warn("Gagal menembus detail folder: ", e);
              }
            }

            const logItem = document.createElement('div');
            logItem.className = `log-item ${indeks === 0 ? 'baru' : ''}`;
            
            logItem.innerHTML = `
              <div class="log-node"></div>
              <div class="log-date">${stringWaktuRelatif} (${jamMenit} WIB)</div>
              <div class="log-card">
                <div class="log-header">
                  <h3 class="log-title">${indeks === 0 ? 'Pembaruan Sistem Terakhir' : 'Riwayat Pembaruan Terpilih'}</h3>
                  <span class="badge ${indeks === 0 ? 'badge-fitur' : 'badge-bug'}">
                    ${indeks === 0 ? 'LIVE REPO' : 'ARCHIVE'}
                  </span>
                </div>
                <div class="log-body">
                  <p style="margin-bottom: 10px;"><strong>Pesan Pengembang:</strong><br>"${pesanCommit}"</p>
                  <p style="font-size: 0.82rem; color: #00ff7f; background: rgba(0,255,127,0.06); padding: 6px 10px; border-radius: 6px; word-break: break-all; border: 1px solid rgba(0,255,127,0.15);">
                    ${indeks === 0 ? teksDaftarFile : '📁 Lihat riwayat lengkap langsung pada repositori.'}
                  </p>
                </div>
                <div class="system-msg">&gt;_ SHA: ${item.sha.substring(0, 7)} | Oleh: ${infoCommit.author.name}</div>
              </div>
            `;
            timelineContainer.appendChild(logItem);
          }
        })
        .catch(err => {
          console.error("Sensor Error: ", err);
          statusServer.innerText = `Sistem Error: ${err.message || "Gagal meraih sinkronisasi data."}`;
        });
    }

    ambilDataGitHubCommits();
    setInterval(ambilDataGitHubCommits, 60000);
  </script>
</body>
</html>
