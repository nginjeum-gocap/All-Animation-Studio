<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sampai Jumpa - All Animation Studio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0b0c10;
      color: #ffffff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      padding: 30px;
      background-color: #15161e;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
    }

    h1 {
      font-size: 1.8rem;
      color: #ff0055;
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
    }

    p {
      font-size: 1rem;
      color: #c5c6c7;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .btn-retry {
      display: inline-block;
      background-color: #66fcf1;
      color: #0b0c10;
      padding: 12px 30px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(102, 252, 241, 0.2);
    }

    .btn-retry:hover {
      background-color: #00ffff;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Yah, Sayang Banget... 😢</h1>
    <p>Lu memilih untuk keluar dari penyambutan. Kalau berubah pikiran dan mau masuk ke All Animation Studio lagi, klik tombol di bawah ya!</p>
    <a href="index.html" class="btn-retry">🔄 Coba Lagi</a>
  </div>

</body>
</html>
